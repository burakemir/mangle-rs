name: mangle-ffi

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build + test the C ABI crate on every target RID. The cdylib
  # itself is pure Rust (portable); the cross-platform risk is in the
  # build.rs cc::Build C-smoke compile (MSVC on Windows vs clang/gcc
  # elsewhere) and in the cdylib/staticlib link step.
  build-test:
    name: build+test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Update Rust toolchain
        run: rustup update stable && rustup default stable
      - name: Build cdylib + staticlib + rlib
        run: cargo build -p mangle-ffi
      - name: Test (unit + integration + C smoke)
        run: cargo test -p mangle-ffi

  # Lint + header-hygiene checks. Platform-independent, so ubuntu only.
  lint:
    name: fmt + clippy + header diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update Rust toolchain
        run: rustup update stable && rustup default stable && rustup component add rustfmt clippy
      - name: rustfmt
        run: cargo fmt -p mangle-ffi -- --check
      - name: clippy (scoped to mangle-ffi)
        run: cargo clippy -p mangle-ffi --all-targets --no-deps -- -D warnings
      - name: Header is up to date with cbindgen
        # build.rs regenerates include/mangle.h; if the committed copy
        # drifts from a fresh regen, fail so the PR author regenerates.
        run: |
          cargo build -p mangle-ffi
          git diff --exit-code crates/mangle-ffi/include/mangle.h
