language = "C"
header = """/* mangle-ffi: C ABI for the Mangle logic-programming engine.
 *
 * This header is auto-generated by cbindgen from the Rust sources in
 * crates/mangle-ffi/src/. Do not edit by hand. Regenerate via `cargo build
 * -p mangle-ffi`; CI fails if the committed copy drifts from a regen.
 *
 * ABI contract:
 *   - Functions returning `int32_t` use 0 = success, nonzero = error.
 *     On nonzero, call `mangle_last_error` for a formatted message
 *     (added in milestone M1; M0 only defines the buffer plumbing).
 *   - `MangleBuffer` outputs are caller-owned: free with `mangle_buffer_free`.
 *   - All entry points are panic-safe (Rust panics are caught and converted
 *     to errors, never propagated across the FFI boundary).
 */"""
include_guard = "MANGLE_FFI_H"
cpp_compat = true
documentation = true
documentation_style = "doxy"
no_includes = false
sys_includes = ["stdint.h", "stddef.h"]

[export]
prefix = ""
# Internal symbols used by the C smoke harness; not part of the public ABI.
exclude = ["c_smoke_run"]

[parse]
parse_deps = false
