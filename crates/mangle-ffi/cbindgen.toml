language = "C"
header = """/* mangle-ffi: C ABI for the Mangle logic-programming engine.
 *
 * This header is auto-generated by cbindgen from the Rust sources in
 * crates/mangle-ffi/src/. Do not edit by hand. Regenerate via `cargo build
 * -p mangle-ffi`; CI fails if the committed copy drifts from a regen.
 *
 * ABI contract:
 *   - Functions returning `int32_t` use 0 = success, nonzero = error.
 *     On nonzero, call `mangle_last_error` for a formatted message
 *     (added in milestone M1; M0 only defines the buffer plumbing).
 *   - `MangleBuffer` outputs are caller-owned: free with `mangle_buffer_free`.
 *   - All entry points are panic-safe (Rust panics are caught and converted
 *     to errors, never propagated across the FFI boundary).
 */"""
include_guard = "MANGLE_FFI_H"
cpp_compat = true
documentation = true
documentation_style = "doxy"
no_includes = false
sys_includes = ["stdint.h", "stddef.h"]

# Forward-declare MangleVal as an opaque struct. The Rust side uses a
# type alias `pub type MangleVal = mangle_common::Value;`, but Value
# lives outside this crate and cbindgen doesn't parse dependencies, so
# we suppress the (broken) auto-generated typedef and emit our own
# opaque forward declaration here.
after_includes = """

/**
 * Opaque value handle. The layout is internal; consumers may only
 * inspect a `MangleVal` through the `mangle_val_*` accessor functions
 * declared below. Lifetime: a handle is borrowed from its producer
 * (`MangleValBuilder` today, cursor row buffers from M4 onwards) and
 * must not outlive it.
 */
typedef struct MangleVal MangleVal;
"""

[export]
prefix = ""
# Internal symbols and the MangleVal type alias (forward-declared above).
exclude = ["c_smoke_run", "MangleVal"]

[parse]
parse_deps = false
